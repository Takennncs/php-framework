<!DOCTYPE html>
<html>
<head>
    <title>Test Framework POST</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-md mx-auto bg-white rounded-lg shadow-lg p-6">
        <h1 class="text-2xl font-bold mb-4">Test Framework POST</h1>
        <form method="POST" action="/framework/test-post">
            <div class="mb-4">
                <label class="block text-sm font-medium mb-2">Email</label>
                <input type="email" name="email" value="admin@example.com" class="w-full px-3 py-2 border rounded-lg">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium mb-2">Password</label>
                <input type="password" name="password" value="password" class="w-full px-3 py-2 border rounded-lg">
            </div>
            <button type="submit" class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600">
                Test Framework POST
            </button>
        </form>
        
        <hr class="my-6">
        
        <h2 class="text-lg font-bold mb-4">Testi ka neid URL'e:</h2>
        <ul class="space-y-2">
            <li><a href="/framework/test-post" class="text-blue-500 hover:underline">GET /framework/test-post</a> (peaks näitama 404)</li>
            <li><a href="/framework/login" class="text-blue-500 hover:underline">GET /framework/login</a> (login leht)</li>
            <li><a href="/framework/register" class="text-blue-500 hover:underline">GET /framework/register</a> (register leht)</li>
        </ul>
    </div>
</body>
</html>
